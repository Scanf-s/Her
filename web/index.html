<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Her - text chat (Phase 0)</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 1rem;
         display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
  h1 { font-size: 1rem; opacity: 0.6; font-weight: 600; }
  #log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem 0; }
  .msg { padding: 0.5rem 0.75rem; border-radius: 12px; max-width: 80%; white-space: pre-wrap; }
  .me { align-self: flex-end; background: #0a84ff; color: #fff; }
  .ai { align-self: flex-start; background: rgba(127,127,127,0.2); }
  .err { align-self: center; color: #ff3b30; font-size: 0.85rem; }
  form { display: flex; gap: 0.5rem; }
  input { flex: 1; padding: 0.6rem; border-radius: 8px; border: 1px solid rgba(127,127,127,0.4); }
  button { padding: 0.6rem 1rem; border-radius: 8px; border: none; background: #0a84ff; color: #fff; }
</style>
</head>
<body>
  <h1>Her - Samantha (text, Phase 0)</h1>
  <div id="log"></div>
  <form id="f">
    <input id="t" autocomplete="off" placeholder="Say something in English..." autofocus>
    <button>Send</button>
  </form>
<script>
  const log = document.getElementById('log');
  const ws = new WebSocket(`ws://${location.host}/ws`);
  let cur = null;

  function add(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
    return d;
  }

  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'token') {
      if (!cur) cur = add('ai', '');
      cur.textContent += m.text;
      log.scrollTop = log.scrollHeight;
    } else if (m.type === 'done') {
      cur = null;
    } else if (m.type === 'error') {
      add('err', 'Error: ' + m.text);
      cur = null;
    }
  };
  ws.onclose = () => add('err', 'Disconnected from server.');

  document.getElementById('f').onsubmit = (ev) => {
    ev.preventDefault();
    const t = document.getElementById('t');
    const text = t.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    add('me', text);
    ws.send(JSON.stringify({ text }));
    t.value = '';
  };
</script>
</body>
</html>
