<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Her - voice chat (Phase 1a)</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 1rem;
         display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
  h1 { font-size: 1rem; opacity: 0.6; font-weight: 600; }
  #log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem 0; }
  .msg { padding: 0.5rem 0.75rem; border-radius: 12px; max-width: 80%; white-space: pre-wrap; }
  .me { align-self: flex-end; background: #0a84ff; color: #fff; }
  .ai { align-self: flex-start; background: rgba(127,127,127,0.2); }
  .err { align-self: center; color: #ff3b30; font-size: 0.85rem; }
  #status { text-align: center; font-size: 0.8rem; color: rgba(127,127,127,0.9); min-height: 1.2em; }
  form { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  input { flex: 1; padding: 0.6rem; border-radius: 8px; border: 1px solid rgba(127,127,127,0.4); }
  button { padding: 0.6rem 1rem; border-radius: 8px; border: none; background: #0a84ff; color: #fff; }
  #ptt { width: 100%; padding: 1rem; font-size: 1rem; font-weight: 600; margin-top: 0.5rem;
         background: #34c759; touch-action: none; user-select: none; }
  #ptt.recording { background: #ff3b30; }
</style>
</head>
<body>
  <h1>Her - Samantha (Phase 1a: voice in)</h1>
  <div id="log"></div>
  <div id="status">Hold the button and speak — or type below.</div>
  <button id="ptt">🎤 Hold to talk</button>
  <form id="f">
    <input id="t" autocomplete="off" placeholder="...or type in English" autofocus>
    <button>Send</button>
  </form>

<script>
  // ---------- UI helpers ----------
  const log = document.getElementById('log');
  const statusEl = document.getElementById('status');
  let cur = null; // the AI bubble currently being streamed into

  function add(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
    return d;
  }
  function setStatus(t) { statusEl.textContent = t; }

  // ---------- WebSocket (replies stream back as tokens, same as Phase 0) ----------
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if (m.type === 'token') {
      if (!cur) cur = add('ai', '');
      cur.textContent += m.text;
      log.scrollTop = log.scrollHeight;
    } else if (m.type === 'done') {
      cur = null;
    } else if (m.type === 'error') {
      add('err', 'Error: ' + m.text);
      cur = null;
    }
  };
  ws.onclose = () => add('err', 'Disconnected from server.');

  // ---------- Text input (Phase 0) ----------
  document.getElementById('f').onsubmit = (ev) => {
    ev.preventDefault();
    const t = document.getElementById('t');
    const text = t.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;
    add('me', text);
    ws.send(JSON.stringify({ text }));
    t.value = '';
  };

  // ---------- Voice input (Phase 1a): mic -> wav 16kHz -> base64 -> WebSocket ----------
  let audioCtx, micSource, recorderNode;
  let frames = [];        // accumulated Float32 PCM blocks while recording
  let recording = false;  // true between PTT-down and PTT-up
  let holding = false;    // button is physically held (guards the async permission race)

  // Lazily set up the mic + audio graph on first use. Triggers the permission prompt.
  async function ensureAudio() {
    if (recorderNode) return;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // Asking for a 16kHz context makes the browser resample the mic to 16kHz for us
    // (exactly what Gemma 4 expects), so we avoid manual resampling.
    audioCtx = new AudioContext({ sampleRate: 16000 });
    await audioCtx.audioWorklet.addModule('pcm-recorder.worklet.js');
    micSource = audioCtx.createMediaStreamSource(stream);
    recorderNode = new AudioWorkletNode(audioCtx, 'pcm-recorder');
    recorderNode.port.onmessage = (e) => { if (recording) frames.push(e.data); };
  }

  async function startRecording() {
    holding = true;
    try {
      await ensureAudio();
    } catch (err) {
      add('err', 'Microphone access is needed: ' + err.message);
      holding = false;
      return;
    }
    if (!holding) return;        // user released during the permission prompt
    await audioCtx.resume();     // autoplay policy may suspend the context
    frames = [];
    recording = true;
    micSource.connect(recorderNode);
    recorderNode.connect(audioCtx.destination); // pulled by the graph; outputs silence (no echo)
    ptt.classList.add('recording');
    setStatus('🔴 Listening...');
  }

  function stopRecording() {
    holding = false;
    if (!recording) return;
    recording = false;
    micSource.disconnect(recorderNode);
    recorderNode.disconnect(audioCtx.destination);
    ptt.classList.remove('recording');
    if (!frames.length) { setStatus('Nothing recorded — hold longer.'); return; }
    setStatus('Sending...');
    sendAudio(encodeWAV(frames, audioCtx.sampleRate));
  }

  async function sendAudio(wavBlob) {
    if (ws.readyState !== WebSocket.OPEN) { add('err', 'Not connected.'); return; }
    const b64 = await blobToBase64(wavBlob);
    add('me', '🎤 (voice message)');
    ws.send(JSON.stringify({ audio: b64 })); // backend puts this base64 straight into input_audio.data
    setStatus('Hold the button and speak — or type below.');
  }

  // Concatenate the Float32 blocks and write a 16-bit PCM WAV (same format as the curl test).
  function encodeWAV(blocks, sampleRate) {
    let length = 0;
    for (const b of blocks) length += b.length;
    const pcm = new Float32Array(length);
    let off = 0;
    for (const b of blocks) { pcm.set(b, off); off += b.length; }

    const buffer = new ArrayBuffer(44 + pcm.length * 2);
    const view = new DataView(buffer);
    const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + pcm.length * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);              // fmt chunk size
    view.setUint16(20, 1, true);               // audio format = PCM
    view.setUint16(22, 1, true);               // channels = mono
    view.setUint32(24, sampleRate, true);      // sample rate
    view.setUint32(28, sampleRate * 2, true);  // byte rate = sampleRate * blockAlign
    view.setUint16(32, 2, true);               // block align = channels * bytesPerSample
    view.setUint16(34, 16, true);              // bits per sample
    writeStr(36, 'data');
    view.setUint32(40, pcm.length * 2, true);
    let p = 44;
    for (let i = 0; i < pcm.length; i++, p += 2) {
      const s = Math.max(-1, Math.min(1, pcm[i]));
      view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7fff, true); // float [-1,1] -> int16
    }
    return new Blob([buffer], { type: 'audio/wav' });
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',')[1]); // strip the "data:...;base64," prefix
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  }

  // Push-to-talk: hold to record, release to send. Pointer events cover mouse + touch.
  const ptt = document.getElementById('ptt');
  ptt.addEventListener('pointerdown', (e) => { e.preventDefault(); startRecording(); });
  ptt.addEventListener('pointerup', stopRecording);
  ptt.addEventListener('pointerleave', stopRecording);
  ptt.addEventListener('pointercancel', stopRecording);
</script>
</body>
</html>
